syntax = "proto3";

option csharp_namespace = "Lesson.Grpc";

package banking;

// ── Lesson 20-A: BankingService — unary RPCs ─────────────────────────────────
// Java parallel:
//   io.grpc / Spring gRPC @GrpcService  →  Grpc.AspNetCore [GrpcService]
//   proto request/response messages     →  same (proto is language-neutral)

service BankingService {
  // Unary: get account summary by id
  rpc GetAccount (GetAccountRequest) returns (AccountReply);

  // Unary: create a new account
  rpc CreateAccount (CreateAccountRequest) returns (AccountReply);

  // Server-streaming (20-B): stream all accounts
  rpc ListAccounts (ListAccountsRequest) returns (stream AccountReply);
}

message GetAccountRequest   { int32 id = 1; }
message CreateAccountRequest {
  string account_number = 1;
  string owner_name     = 2;
  double initial_balance = 3;
}
message ListAccountsRequest { }   // empty — returns all rows

message AccountReply {
  int32  id             = 1;
  string account_number = 2;
  string owner_name     = 3;
  double balance        = 4;
}
